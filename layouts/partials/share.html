{{/* Share bar — placed after article body */}}
<div class="flex flex-wrap items-center gap-x-5 gap-y-2 border-y border-[#d8d6d0] py-4 mb-8">
  <p class="font-montserrat font-bold text-[9px] tracking-[1.54px] uppercase text-[#5a5a5a] shrink-0">Share</p>
  <div class="flex flex-wrap items-center gap-x-4 gap-y-2">

    <a href="https://x.com/intent/tweet?text={{ .Title | urlquery }}&url={{ .Permalink | urlquery }}"
       target="_blank" rel="noopener noreferrer"
       class="flex items-center gap-1.5 font-montserrat font-semibold text-[10px] tracking-[1.1px] uppercase text-[#5a5a5a] hover:text-black transition-colors">
      <span class="inline-flex items-center justify-center w-5 h-5 border border-[#d8d6d0] text-[9px] font-black">𝕏</span>
      X
    </a>

    <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ .Permalink | urlquery }}"
       target="_blank" rel="noopener noreferrer"
       class="flex items-center gap-1.5 font-montserrat font-semibold text-[10px] tracking-[1.1px] uppercase text-[#5a5a5a] hover:text-black transition-colors">
      <span class="inline-flex items-center justify-center w-5 h-5 border border-[#d8d6d0] text-[9px] font-black">in</span>
      LinkedIn
    </a>

    <a href="https://www.facebook.com/sharer/sharer.php?u={{ .Permalink | urlquery }}"
       target="_blank" rel="noopener noreferrer"
       class="flex items-center gap-1.5 font-montserrat font-semibold text-[10px] tracking-[1.1px] uppercase text-[#5a5a5a] hover:text-black transition-colors">
      <span class="inline-flex items-center justify-center w-5 h-5 border border-[#d8d6d0] text-[9px] font-black">f</span>
      Facebook
    </a>

    <a href="https://bsky.app/intent/compose?text={{ printf "%s %s" .Title .Permalink | urlquery }}"
       target="_blank" rel="noopener noreferrer"
       class="flex items-center gap-1.5 font-montserrat font-semibold text-[10px] tracking-[1.1px] uppercase text-[#5a5a5a] hover:text-black transition-colors">
      <span class="inline-flex items-center justify-center w-5 h-5 border border-[#d8d6d0] text-[9px] font-black">☁</span>
      Bluesky
    </a>

    <button
      onclick="navigator.clipboard.writeText(window.location.href).then(function(){var b=this;b.textContent='COPIED!';b.style.color='#822626';setTimeout(function(){b.textContent='COPY LINK';b.style.color='';},2000)}.bind(this))"
      class="flex items-center gap-1.5 font-montserrat font-semibold text-[10px] tracking-[1.1px] uppercase text-[#5a5a5a] hover:text-black transition-colors bg-transparent border-none p-0 cursor-pointer">
      <span class="inline-flex items-center justify-center w-5 h-5 border border-[#d8d6d0] text-[9px]">⎘</span>
      Copy Link
    </button>

  </div>
</div>
