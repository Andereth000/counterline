{{ define "main" }}
<div class="bg-white text-black font-montserrat antialiased">

  <div class="max-w-[1360px] mx-auto px-[50px] py-10 border-b border-[#d8d6d0] text-center">
    <h1 class="font-inter font-bold text-[28px] md:text-[36px] tracking-[-0.6px] leading-[1.1] text-black uppercase">{{ .Title }}</h1>
    {{ with .Description }}
    <p class="font-lora italic text-[#5a5a5a] text-[16px] mt-2 max-w-[800px] mx-auto">{{ . }}</p>
    {{ end }}
  </div>

  {{ if .Content }}
  <div class="max-w-3xl mx-auto px-6 py-12">
    <div class="markdown-content font-lora text-[15px] leading-[1.82] text-[#1a1a1a]">
      {{ .Content }}
    </div>
  </div>
  {{ end }}

</div>
{{ end }}
