backend:
  name: github
  repo: Andereth000/counterline
  branch: main

media_folder: static/images
public_folder: /images

collections:
  - name: articles
    label: Articles
    folder: content/articles
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Author, name: author, widget: string }
      - { label: Description, name: description, widget: string }
      - { label: Featured Image, name: featured_image, widget: image, required: false }
      - { label: Desk, name: desks, widget: select, multiple: true, options: [spectacle, economic-assumption, headline-analysis, old-news, press-check, the-record] }
      - { label: Section, name: sections, widget: select, multiple: true, options: [society-economy, culture-media, filmrem, the-counterline-standard] }
      - { label: Draft, name: draft, widget: boolean, default: true }
      - { label: Body, name: body, widget: markdown }