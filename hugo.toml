baseURL = 'https://dancing-lily-98f91e.netlify.app/'
languageCode = 'en-US'
title = 'The Counterline'
theme = 'hugo-news'

[params]
  description = "The Counterline"
  author = "The Counterline"

[taxonomies]
  desk = "desks"
  section = "sections"
  author = "authors"
  tag = "tags"

[pagination]
  pagerSize = 10

[build]
  writeStats = true
  noJSConfigInAssets = false

[build.cachebusters]
  [build.cachebusters."(postcss|tailwind)\\.config\\.js"]
    source = "(postcss|tailwind)\\.config\\.js"
    target = "css"

[outputs]
  home = ["HTML", "RSS", "JSON"]

